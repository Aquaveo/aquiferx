
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquifer Analyst</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    /* Ensure Leaflet controls don't overlap our UI */
    .leaflet-container {
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    /* Fix tile seam artifacts at fractional zoom levels */
    .leaflet-tile {
      image-rendering: -webkit-optimize-contrast;
      outline: 1px solid transparent;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "leaflet": "https://esm.sh/leaflet@^1.9.4"
  }
}
</script>
<link rel="stylesheet" href="./index.css">
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>
<script>
  // Capture window.location synchronously BEFORE the module bundle is
  // fetched, so the password-recovery snapshot (recovery-url-snapshot.ts)
  // can read the original hash even after Supabase JS has consumed and
  // cleared it. Diagnostics on 2026-05-01 showed that in-module reads of
  // window.location.hash race against Supabase's _initialize() — the
  // bundler hoists/orders module evaluation in ways that don't match
  // source-level import order. An inline <script> guarantees this runs
  // before any JS module loads.
  window.__GEOGLOWS_INITIAL_URL__ = {
    hash: window.location.hash,
    search: window.location.search,
  };
</script>
<script type="module" src="./index.tsx"></script>
</body>
</html>
